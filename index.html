<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>魔王アルケー ツイート管理</title>
  <style>
    :root {
      --bg:#0d0d14; --bg2:#13131f; --bg3:#1a1a2e;
      --border:#2a2a4a; --accent:#7b5ea7; --accent2:#a374d5;
      --lore:#c0392b; --lore2:#e74c3c;
      --normal:#2980b9; --normal2:#3498db;
      --text:#e8e8f0; --text2:#9090b0;
      --green:#27ae60; --green2:#2ecc71;
      --red:#c0392b; --red2:#e74c3c;
      --yellow:#f39c12;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;min-height:100vh;}

    /* ─── HEADER ─── */
    header{
      background:linear-gradient(135deg,#0d0d14,#1a0a2e);
      border-bottom:1px solid var(--border);
      padding:15px 22px; position:sticky; top:0; z-index:300;
      display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px;
    }
    .htitle{display:flex;align-items:center;gap:8px;}
    .htitle h1{
      font-size:1.15rem;font-weight:700;
      background:linear-gradient(90deg,#a374d5,#7b5ea7,#c0392b);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    }
    .stats{display:flex;gap:7px;flex-wrap:wrap;}
    .stat{background:var(--bg3);border:1px solid var(--border);border-radius:14px;padding:3px 10px;font-size:0.74rem;color:var(--text2);}
    .stat span{color:var(--text);font-weight:700;}
    .stat.su{border-color:rgba(39,174,96,.4);}
    .stat.sr{border-color:rgba(192,57,43,.4);}

    #ss{font-size:0.74rem;padding:3px 10px;border-radius:14px;border:1px solid;transition:all .3s;user-select:none;}
    #ss.saved  {color:var(--green2);border-color:var(--green);background:rgba(39,174,96,.1);}
    #ss.connect{color:var(--accent2);border-color:var(--accent);background:rgba(123,94,167,.1);cursor:pointer;}
    #ss.connect:hover{background:rgba(123,94,167,.25);}
    #ss.error  {color:var(--red2);border-color:var(--red);background:rgba(192,57,43,.1);}

    /* ─── TOOLBAR ─── */
    .toolbar{padding:9px 22px;display:flex;gap:6px;flex-wrap:wrap;align-items:center;background:var(--bg2);border-bottom:1px solid var(--border);}
    #tagbar{padding:7px 22px;display:flex;gap:5px;flex-wrap:wrap;align-items:center;background:var(--bg2);border-bottom:1px solid var(--border);display:none;}
    .tbarlabel{font-size:0.72rem;color:var(--text2);margin-right:2px;flex-shrink:0;}
    .sep{width:1px;height:20px;background:var(--border);margin:0 2px;}

    .btn{border:none;border-radius:7px;padding:5px 11px;font-size:0.78rem;cursor:pointer;font-family:inherit;transition:all .18s;font-weight:600;}
    .bo{background:transparent;border:1px solid var(--border);color:var(--text2);}
    .bo:hover{border-color:var(--accent);color:var(--text);}
    .bo.on{border-color:var(--accent);color:var(--accent2);background:rgba(123,94,167,.15);}
    .bo.on-red{border-color:var(--red);color:var(--red2);background:rgba(192,57,43,.12);}

    /* ─── MAIN ─── */
    main{max-width:840px;margin:0 auto;padding:20px 16px 60px;}
    .dg{margin-bottom:26px;}
    .dh{display:flex;align-items:center;gap:10px;margin-bottom:11px;padding-bottom:7px;border-bottom:1px solid var(--border);}
    .dl{font-size:.88rem;font-weight:700;color:var(--text2);}
    .dc{font-size:.69rem;color:var(--text2);background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:2px 8px;}

    /* ─── CARDS ─── */
    .card{
      background:var(--bg2);border:1px solid var(--border);border-radius:10px;
      padding:12px 14px;margin-bottom:7px;
      display:flex;gap:10px;align-items:flex-start;
      transition:all .2s;cursor:pointer;
    }
    .card:hover{border-color:var(--accent);background:var(--bg3);}
    .card.lore  {border-left:3px solid var(--lore);}
    .card.normal{border-left:3px solid var(--normal);}

    .card.used{opacity:.42;background:#111118;border-color:#222;}
    .card.lore.used  {border-left-color:#4a1515;}
    .card.normal.used{border-left-color:#112233;}

    .card.rej{opacity:.28;background:#100808;border-color:rgba(192,57,43,.2);}
    .card.lore.rej  {border-left-color:rgba(192,57,43,.4);}
    .card.normal.rej{border-left-color:rgba(192,57,43,.25);}
    .card.rej:hover{opacity:.48;}

    .chk{
      flex-shrink:0;width:21px;height:21px;margin-top:1px;
      border-radius:6px;border:2px solid var(--border);
      display:flex;align-items:center;justify-content:center;
      font-size:12px;font-weight:700;transition:all .18s;
    }
    .card:not(.used):not(.rej):hover .chk{border-color:var(--green2);}
    .card.used .chk{background:var(--green);border-color:var(--green);color:#fff;}
    .card.rej  .chk{background:var(--red);border-color:var(--red);color:#fff;}

    .cb{flex:1;min-width:0;}
    .cm{display:flex;gap:7px;align-items:center;flex-wrap:wrap;margin-bottom:7px;}
    .tb{font-size:.66rem;padding:2px 7px;border-radius:8px;font-weight:700;flex-shrink:0;}
    .tbl{background:rgba(192,57,43,.2);color:var(--lore2);border:1px solid rgba(192,57,43,.35);}
    .tbn{background:rgba(41,128,185,.18);color:var(--normal2);border:1px solid rgba(41,128,185,.3);}
    .ge{font-size:.7rem;color:var(--text2);}
    .ti{font-size:.68rem;color:var(--accent2);margin-left:auto;}
    .eb{font-size:.65rem;color:#8a7030;background:rgba(243,156,18,.1);border:1px solid rgba(243,156,18,.22);border-radius:7px;padding:1px 6px;}
    .lno{font-size:.65rem;color:#e8a0a0;background:rgba(192,57,43,.15);border:1px solid rgba(192,57,43,.4);border-radius:7px;padding:1px 6px;font-weight:700;letter-spacing:.02em;}

    .rjbtn{
      background:none;border:none;cursor:pointer;font-size:.82rem;
      opacity:.25;transition:opacity .18s;padding:0 2px;flex-shrink:0;
      line-height:1;
    }
    .card:hover .rjbtn{opacity:.65;}
    .rjbtn.on{opacity:1;}

    .tt{font-size:.87rem;line-height:1.82;color:var(--text);white-space:pre-wrap;word-break:break-word;margin-bottom:7px;}
    .card.used .tt{color:#404040;text-decoration:line-through;text-decoration-color:#2a2a2a;}
    .card.rej  .tt{color:#3a2020;text-decoration:line-through;text-decoration-color:rgba(192,57,43,.35);}

    .ta{display:flex;flex-wrap:wrap;gap:4px;align-items:center;margin-bottom:5px;}
    .tp{
      background:rgba(123,94,167,.14);border:1px solid rgba(123,94,167,.28);
      color:var(--accent2);border-radius:7px;padding:2px 7px;
      font-size:.65rem;cursor:pointer;transition:all .15s;
      display:flex;align-items:center;gap:3px;user-select:none;
    }
    .tp:hover{background:rgba(123,94,167,.28);}
    .tp.fa{background:var(--accent);border-color:var(--accent);color:#fff;}
    .tx{opacity:.6;cursor:pointer;font-size:.78em;transition:opacity .15s;padding:0 1px;}
    .tx:hover{opacity:1;}
    .atb{
      background:none;border:1px dashed var(--border);color:var(--text2);
      border-radius:7px;padding:2px 8px;font-size:.65rem;cursor:pointer;
      transition:all .15s;font-family:inherit;
    }
    .atb:hover{border-color:var(--accent);color:var(--accent2);}
    .cid{font-size:.62rem;color:#303040;font-family:monospace;}

    /* ─── TAG POPOVER ─── */
    #pop{
      position:absolute;z-index:500;
      background:var(--bg3);border:1px solid var(--border);border-radius:10px;
      padding:10px;min-width:220px;max-width:290px;
      box-shadow:0 8px 32px rgba(0,0,0,.65);display:none;
    }
    #popcont{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;}
    .ptag{
      background:rgba(123,94,167,.11);border:1px solid rgba(123,94,167,.22);
      color:var(--text2);border-radius:7px;padding:3px 9px;
      font-size:.73rem;cursor:pointer;transition:all .15s;user-select:none;
    }
    .ptag:hover{background:rgba(123,94,167,.26);color:var(--text);}
    .ptag.on{background:var(--accent);border-color:var(--accent);color:#fff;}
    #cti{
      width:100%;background:var(--bg2);border:1px solid var(--border);
      border-radius:7px;padding:5px 9px;color:var(--text);font-size:.76rem;
      font-family:inherit;outline:none;
    }
    #cti:focus{border-color:var(--accent);}
    #cti::placeholder{color:var(--text2);}

    /* ─── MISC ─── */
    .empty{text-align:center;padding:50px 20px;color:var(--text2);}
    .empty .ei{font-size:2rem;margin-bottom:8px;}
    #toast{
      position:fixed;bottom:20px;right:20px;
      background:var(--bg3);border:1px solid var(--green);color:var(--green2);
      border-radius:9px;padding:8px 15px;font-size:.79rem;font-weight:600;
      opacity:0;transform:translateY(8px);transition:all .22s;
      pointer-events:none;z-index:999;
    }
    #toast.show{opacity:1;transform:translateY(0);}
    #toast.red{border-color:var(--red);color:var(--red2);}
    ::-webkit-scrollbar{width:5px;}
    ::-webkit-scrollbar-track{background:var(--bg);}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
  </style>
</head>
<body>

<header>
  <div class="htitle">
    <span style="font-size:1.4rem">👑</span>
    <h1>魔王アルケー ツイート管理</h1>
  </div>
  <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
    <div class="stats">
      <div class="stat">全 <span id="ct">0</span></div>
      <div class="stat">未使用 <span id="cu">0</span></div>
      <div class="stat su">✓使用済み <span id="cs">0</span></div>
      <div class="stat sr">🚫不採用 <span id="cr">0</span></div>
    </div>
    <div id="ss" class="saved">✓ 読み込み済み</div>
  </div>
</header>

<div class="toolbar">
  <button class="btn bo on"  id="fa"  onclick="setF('all')">すべて</button>
  <button class="btn bo"     id="fun" onclick="setF('unused')">未使用</button>
  <button class="btn bo"     id="fs"  onclick="setF('used')">✓ 使用済み</button>
  <button class="btn bo"     id="fr"  onclick="setF('rej')">🚫 不採用</button>
  <div class="sep"></div>
  <button class="btn bo on"  id="ta"  onclick="setT('all')">両方</button>
  <button class="btn bo"     id="tl"  onclick="setT('lore')">🔴 所業・伝説</button>
  <button class="btn bo"     id="tn"  onclick="setT('normal')">🔵 通常</button>
</div>

<div id="tagbar"></div>
<main><div id="list"></div></main>

<div id="pop">
  <div id="popcont"></div>
  <input id="cti" placeholder="カスタムタグ… (Enter で追加)" onclick="event.stopPropagation()">
</div>
<div id="toast"></div>

, "type": "normal", "text": "千年前の夕焼けを、俺は正確に覚えている。\nだが昨日の夕焼けは思い出せない。\n\n永遠とは、記憶が選り好みを始めることだ。", "recommended_time": "18:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-02-26-4", "date": "2026-02-26", "genre": "創造と破壊", "type": "normal", "text": "壊すのに理由はいらない。\n創るのにも、本当は理由などない。\n\nただ、手が動いた。それだけだ。\n理由は後から、人間がつけてくれる。", "recommended_time": "21:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-02-26-5", "date": "2026-02-26", "genre": "所業・伝説（魔界での出来事）", "type": "lore", "text": "魔界の玉座は七つある。\nそのうち六つは空席だ。座った者が皆、耐えられなかったからではない。\n\n俺が「まだ早い」と言ったからだ。\n\n……いつになったら許すのかと聞かれても困る。俺自身、考えたことがない。", "recommended_time": "20:00", "used": false, "rejected": false, "tags": [], "edits": [], "lore_no": 3}, {"id": "2026-02-26-6", "date": "2026-02-26", "genre": "所業・伝説（神との関係）", "type": "lore", "text": "神と最後に言葉を交わしたのは、名前のない時代だった。\n\n「お前が根源なら、俺は何だ」と神が言った。\n「答えだ」と俺は返した。\n\n以来、神は問いを発するのをやめた。", "recommended_time": "22:30", "used": false, "rejected": false, "tags": [], "edits": [], "lore_no": 4}, {"id": "2026-02-27-1", "date": "2026-02-27", "genre": "哲学・存在論", "type": "normal", "text": "「存在する」とはどういうことか。\n人間は生まれて初めてその問いに気づく。\n\n俺はその問いより先に存在していた。\nだから今でも——答えを持っていない。", "recommended_time": "07:30", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-02-27-2", "date": "2026-02-27", "genre": "日常観察（魔王視点）", "type": "normal", "text": "雨が降っている。\n人間はこれを「悪天候」と呼ぶが、俺には理解できない。\n\n水が落ちてくる。それだけのことだ。\n良いも悪いも——お前たちが決めることではないか。", "recommended_time": "12:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-02-27-3", "date": "2026-02-27", "genre": "詩的・抒情的", "type": "normal", "text": "夕暮れというのは、昼が死ぬ瞬間だ。\n毎日死んで、毎日甦る。\n\nそれを「美しい」と思う者の感性は——悪くない。", "recommended_time": "18:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-02-27-4", "date": "2026-02-27", "genre": "所業・伝説（大陸・王国の終焉）", "type": "lore", "text": "東の大陸に、かつて七つの王国があった。\n今は三つしかない。\n\n俺が滅ぼしたのではない。\n残りの四つが、互いに消し合った。\n俺はただ——少し、傍で見ていた。", "recommended_time": "20:00", "used": false, "rejected": false, "tags": [], "edits": [], "lore_no": 5}, {"id": "2026-02-27-5", "date": "2026-02-27", "genre": "問いかけ", "type": "normal", "text": "一度も後悔したことのない者がいるとすれば、\nそれは何も選んでこなかった者だ。\n\nお前は今日、何かを選んだか。", "recommended_time": "21:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-02-27-6", "date": "2026-02-27", "genre": "所業・伝説（英雄との契約・対決）", "type": "lore", "text": "「俺を倒せば、世界に平和が訪れる」と言った英雄がいた。\n\n面白い理屈だと思った。\n倒した後どうなったか？\nその英雄の言う「平和」は、まだ誰も見ていない。", "recommended_time": "22:30", "used": false, "rejected": false, "tags": [], "edits": [], "lore_no": 6}, {"id": "2026-02-28-1", "date": "2026-02-28", "genre": "世界観・魔界", "type": "normal", "text": "魔界に朝はない。\n光の届かない場所で生まれた者は、夜明けなど必要としない。\n\nそれでも時々、俺は地上の空を見に行く。理由は、俺にも分からない。", "recommended_time": "07:30", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-02-28-2", "date": "2026-02-28", "genre": "時間と永遠", "type": "normal", "text": "俺が生まれてから何千年か経つ。\n正確には覚えていない。覚える必要がなかった。\n\n時間は、終わりを持つ者のためにある。", "recommended_time": "12:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-02-28-3", "date": "2026-02-28", "genre": "創造と破壊", "type": "normal", "text": "俺は多くのものを壊してきた。\nそして気づいた。何かが壊れると、必ず何かが生まれる。\n\n破壊は終わりではない。ただの——変化だ。", "recommended_time": "18:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-02-28-4", "date": "2026-02-28", "genre": "人間観察・皮肉", "type": "normal", "text": "人間は「奇跡」という言葉が好きだ。\n説明できないものに名前をつけて、安心する。\n\n俺から言わせれば、説明できないことなど何もない。ただ、知らないだけだ。", "recommended_time": "21:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-02-28-5", "date": "2026-02-28", "genre": "所業・伝説（魔界での出来事）", "type": "lore", "text": "かつて魔界に、俺より強くなろうとした魔族がいた。\n千年をかけて修行し、俺の元に現れた。\n\nその眼に恐怖はなかった。俺は少し、彼のことが好きだった。——それでも、負けた。", "recommended_time": "20:00", "used": false, "rejected": false, "tags": [], "edits": [], "lore_no": 7}, {"id": "2026-02-28-6", "date": "2026-02-28", "genre": "所業・伝説（神との関係）", "type": "lore", "text": "神と最後に話したのは、ずいぶん前だ。\n「なぜ滅ぼすのか」と問われた。\n\n俺は答えた。「なぜ創るのか」と。——その後、神は来なくなった。", "recommended_time": "22:30", "used": false, "rejected": false, "tags": [], "edits": [], "lore_no": 8}, {"id": "2026-03-01-1", "date": "2026-03-01", "genre": "所業・伝説（氷原の征服）", "type": "lore", "text": "Vyrnaを征した日、ゼイファーが言った。「この静寂は、閣下にこそふさわしい」と。俺は答えなかった。——静寂の意味を知る者に、言葉は要らぬ。", "recommended_time": "20:00", "used": false, "rejected": false, "tags": [], "edits": [], "lore_no": 9}, {"id": "2026-03-01-2", "date": "2026-03-01", "genre": "所業・伝説（終焉の歌姫）", "type": "lore", "text": "ノクティアが歌うと、星が震える。ある夜、Stellar Gateが勝手に開いた。「歌で門を開くな」と言ったら、彼女は笑った。——152年ぶりに。", "recommended_time": "22:00", "used": false, "rejected": false, "tags": [], "edits": [], "lore_no": 10}, {"id": "2026-03-01-3", "date": "2026-03-01", "genre": "孤独と支配", "type": "normal", "text": "頂点とは、誰も隣にいないということだ。寂しいかと聞かれることがある。——寂しさとは、かつて誰かがいた場所に使う言葉だ。俺の隣には、最初から誰もいなかった。", "recommended_time": "08:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-03-01-4", "date": "2026-03-01", "genre": "征服の記憶", "type": "normal", "text": "千の城を落とした。名前を覚えているのは三つだけだ。記憶に残るのは強い敵ではない。最後まで笑っていた者だけだ。", "recommended_time": "12:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-03-01-5", "date": "2026-03-01", "genre": "問いかけ", "type": "normal", "text": "人間は「なぜ生きるのか」と問う。だが問うべきは「なぜ問うのか」だ。答えがなくても問い続ける。——それだけが、お前たちの唯一の美点だ。", "recommended_time": "18:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-03-01-6", "date": "2026-03-01", "genre": "詩的・抒情的", "type": "normal", "text": "雨が降る。千年前も、こんな雨だった。変わったのは、濡れる者たちの名前だけだ。", "recommended_time": "21:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-03-02-1", "date": "2026-03-02", "genre": "所業・伝説（炎の残滓）", "type": "lore", "text": "Eryndorの深森が燃えた日、灰の中から影が立ち上がった。レヴァナインだ。俺の炎が意志を持ち、形を成した。——滅ぼした先に何かが生まれる。それが俺の業というなら、受け入れよう。", "recommended_time": "20:00", "used": false, "rejected": false, "tags": [], "edits": [], "lore_no": 11}, {"id": "2026-03-02-2", "date": "2026-03-02", "genre": "所業・伝説（砂漠の攻略）", "type": "lore", "text": "イリムがKael'sarを「三日で落とす」と言った。七日かかった。千年の戦歴で唯一の誤算だと本人は言う。——俺は黙っていた。もう一つ、数え忘れていることを知っているから。", "recommended_time": "22:00", "used": false, "rejected": false, "tags": [], "edits": [], "lore_no": 12}, {"id": "2026-03-02-3", "date": "2026-03-02", "genre": "孤独と支配", "type": "normal", "text": "頂に立つ者は、下を見ても同胞がなく、横を見ても対等がいない。だから空を見る。空だけが、俺に何も求めない。", "recommended_time": "08:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-03-02-4", "date": "2026-03-02", "genre": "征服の記憶", "type": "normal", "text": "百の城を落としたが、覚えているのは最初の一つだけだ。門が開いた瞬間の、あの静けさ。勝利とは、常に想像より静かなものだった。", "recommended_time": "12:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-03-02-5", "date": "2026-03-02", "genre": "人間観察・皮肉", "type": "normal", "text": "人間は「永遠の愛」を誓うが、五十年と保たぬ。短い命で永遠を語る——滑稽か。いや、それこそが彼らの凄みかもしれん。認めるのは少々癪だが。", "recommended_time": "18:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-03-02-6", "date": "2026-03-02", "genre": "世界観・魔界の日常", "type": "normal", "text": "ベルフェゴールが新しい菓子を持ってきた。「閣下の御口に合うかと」と言うが、俺に好みなどあっただろうか。——まあ、不味くはなかった。それだけは伝えておく。", "recommended_time": "21:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-03-03-1", "date": "2026-03-03", "genre": "所業・伝説（記録官の帰還）", "type": "lore", "text": "Azure Islesに記録官を遣わした。星明かりの魔法使いどもが何を企んでいるか、調べよと。レイヴンは三日で戻った。「何も」と報告した。あの顔は嘘をつく時の顔だった。だが、俺は問い詰めなかった。", "recommended_time": "20:00", "used": false, "rejected": false, "tags": [], "edits": [], "lore_no": 13}, {"id": "2026-03-03-2", "date": "2026-03-03", "genre": "所業・伝説（魔鍛巨人の刃）", "type": "lore", "text": "バルドゥークが新しい剣を鍛え上げた。「閣下の炎でなければ打てぬ鋼がある」と言う。俺は黙って炎を注いだ。完成した刃は、夜空の色をしていた。使い手はまだ、いない。", "recommended_time": "22:00", "used": false, "rejected": false, "tags": [], "edits": [], "lore_no": 14}, {"id": "2026-03-03-3", "date": "2026-03-03", "genre": "哲学・存在論", "type": "normal", "text": "永遠に存在するということは、あらゆる問いの答えを知ることではない。あらゆる問いが無意味になる地点に立つということだ。", "recommended_time": "08:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-03-03-4", "date": "2026-03-03", "genre": "時間と永遠", "type": "normal", "text": "千年前に植えた樹がある。今は森になっている。俺が何をしたか覚えている者はいない。樹だけが知っている。——それで十分だと思う。", "recommended_time": "12:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-03-03-5", "date": "2026-03-03", "genre": "創造と破壊", "type": "normal", "text": "何かを壊すたびに、別の何かが始まる。俺はそれを何千回も見てきた。それでもまだ、壊す瞬間には少し躊躇う。その躊躇いを、人は良心と呼ぶらしい。", "recommended_time": "18:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-03-03-6", "date": "2026-03-03", "genre": "世界観・魔界の日常", "type": "normal", "text": "今朝、玉座の間に花が一輪置かれていた。誰がやったかは分かっている。分かっていて、知らぬふりをする。——魔王の仕事の半分は、そういうことだ。", "recommended_time": "21:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-03-04-1", "date": "2026-03-04", "genre": "所業・伝説（記録局長の沈黙）", "type": "lore", "text": "デモグラスが俺の前に来て言った。「閣下、記録できぬものがございます」と。\n\n何だ、と問えば「閣下の御心です」と返された。\n\n——あの男は万象を記録する。だが、俺の内側だけは白紙のままだという。それでいい。", "recommended_time": "20:00", "used": false, "rejected": false, "tags": [], "edits": [], "lore_no": 15}, {"id": "2026-03-04-2", "date": "2026-03-04", "genre": "所業・伝説（深淵の支配者）", "type": "lore", "text": "マルディムが深淵から戻らなくなって百年が経った頃、俺は自ら降りた。\n\nSoulgraspで彼の魂に触れたとき、笑っていた。「ここは心地よいのです」と。\n\n——深淵とは、落ちた者のためではなく、選んだ者のためにある。", "recommended_time": "22:00", "used": false, "rejected": false, "tags": [], "edits": [], "lore_no": 16}, {"id": "2026-03-04-3", "date": "2026-03-04", "genre": "世界観・魔界の日常", "type": "normal", "text": "玉座の間に書類が山積みになっている。ベルフェゴールが「晩餐の献立書」を紛れ込ませたのは、すぐわかった。\n\n——承認印を押した。あの鹿肉の煮込みは、確かに悪くなかった。", "recommended_time": "08:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-03-04-4", "date": "2026-03-04", "genre": "孤独と支配", "type": "normal", "text": "全てを従える者には、従う相手がいない。\n\n不便か、と問われれば——否。これは不便ではない。ただ、風景が違うだけだ。頂の風は、下からは見えぬ方角から吹く。", "recommended_time": "12:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-03-04-5", "date": "2026-03-04", "genre": "征服の記憶", "type": "normal", "text": "ある国を滅ぼした翌朝、花が咲いていた。\n\n瓦礫の隙間から、名も知らぬ白い花が。俺はそれを踏まなかった。——理由は、今もわからない。", "recommended_time": "18:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-03-04-6", "date": "2026-03-04", "genre": "日常観察", "type": "normal", "text": "人間は「永遠の愛」を誓うらしい。寿命が百年もない種族が、永遠を語る。\n\n——滑稽ではない。むしろ、俺にはできぬことだ。終わりがあるから、永遠を信じられる。", "recommended_time": "21:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-03-06-1", "date": "2026-03-06", "genre": "所業・伝説（氷原の沈黙）", "type": "lore", "text": "Vyrnaの氷原を渡るとき、ノクティアが足を止めた。「ここだけは閣下の炎が届かない」と笑う。届かないのではない。届かせなかったのだ。その違いを、あいつはまだ知らない。", "recommended_time": "20:00", "used": false, "rejected": false, "tags": [], "edits": [], "lore_no": 17}, {"id": "2026-03-06-2", "date": "2026-03-06", "genre": "所業・伝説（百年の沈黙）", "type": "lore", "text": "エリューシオンは百年に一度しか口を開かない。前回あいつが言ったのは「退屈です」の一言だった。次に何を言うのか、俺でさえ読めん。", "recommended_time": "22:00", "used": false, "rejected": false, "tags": [], "edits": [], "lore_no": 18}, {"id": "2026-03-06-3", "date": "2026-03-06", "genre": "日常・感覚", "type": "normal", "text": "三日間、何も壊していない。部下どもが妙にそわそわしている。心配するな、別に溜めているわけではない。", "recommended_time": "08:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-03-06-4", "date": "2026-03-06", "genre": "日常・感覚", "type": "normal", "text": "なぜ俺の寝起きを皆が恐れる。別に機嫌が悪いわけでは……いや、多少は悪いかもしれん。", "recommended_time": "12:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-03-06-5", "date": "2026-03-06", "genre": "魔王の矜持", "type": "normal", "text": "魔王として三つだけ譲れんものがある。玉座の温度、晩餐の静けさ、そして朝の一杯目の茶を邪魔されないこと。", "recommended_time": "18:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-03-06-6", "date": "2026-03-06", "genre": "存在・思想", "type": "normal", "text": "強さとは便利なものだと思っていた。だが強くなるほど、できることが減る。全力を出せる相手がいない。手加減という技術ばかりが上達していく。", "recommended_time": "21:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-03-08-1", "date": "2026-03-08", "genre": "所業・伝説（焼かれた森の記憶）", "type": "lore", "text": "Eryndorの森でゼイファーが足を止めた。「この木、覚えておいでですか」と。千二百年前に俺が焼いた森の、唯一の生き残りだ。あいつはそれを知っていて訊いた。俺は何も言わず、歩き出した。", "recommended_time": "20:00", "used": false, "rejected": false, "tags": [], "edits": [], "lore_no": 19}, {"id": "2026-03-08-2", "date": "2026-03-08", "genre": "所業・伝説（沈んだ大陸）", "type": "lore", "text": "イリムが古い地図を広げた。そこに描かれた大陸は、もうない。俺が沈めた。「海の底にまだ街が残っているのですね」とイリムは笑う。残っている。だからこそ、俺はあの海域に近づけない。", "recommended_time": "22:00", "used": false, "rejected": false, "tags": [], "edits": [], "lore_no": 20}, {"id": "2026-03-08-3", "date": "2026-03-08", "genre": "存在・倦怠", "type": "normal", "text": "今日は何も起きなかった。明日も何も起きないだろう。一万年もそうだった。それでも毎朝、目が覚める。", "recommended_time": "08:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-03-08-4", "date": "2026-03-08", "genre": "人間への困惑", "type": "normal", "text": "人間は別れ際に「またね」と言う。会う予定もないのに。あれは約束なのか、それとも祈りなのか。", "recommended_time": "12:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-03-08-5", "date": "2026-03-08", "genre": "記憶の実害", "type": "normal", "text": "記憶が多すぎると三つ困ることがある。まず、どの景色を見ても既視感がある。次に、誰かの顔が別の誰かと重なる。最後に——新しいことに驚けなくなる。驚きとは、知らないから生まれるものだと最近ようやく気づいた。", "recommended_time": "18:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-03-08-6", "date": "2026-03-08", "genre": "皮肉・敗北", "type": "normal", "text": "レヴァナインに将棋を教わった。三千年の戦術経験が通じると思っていたが、六連敗した。盤の上では俺の炎も威圧も無意味らしい。「もう一局」と言ったら、あいつは少し嬉しそうだった。", "recommended_time": "21:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-03-09-1", "date": "2026-03-09", "genre": "所業・伝説（星の欠片）", "type": "lore", "text": "バルドゥークがAzure Islesから星の欠片を持ち帰った。「閣下に似た光を見つけました」と差し出す。俺に似た光など存在しない。だが、受け取った。——捨てられなかった、とも言う。", "recommended_time": "20:00", "used": false, "rejected": false, "tags": [], "edits": [], "lore_no": 21}, {"id": "2026-03-09-2", "date": "2026-03-09", "genre": "所業・伝説（砂嵐の鴉）", "type": "lore", "text": "Kael'sarの砂嵐の中で、レイヴンだけが目を閉じなかった。「見えるのです、砂の向こうが」と言った。俺には見えなかった。根源の魔王に見えぬものを、あの鴉は見る。", "recommended_time": "22:00", "used": false, "rejected": false, "tags": [], "edits": [], "lore_no": 22}, {"id": "2026-03-09-3", "date": "2026-03-09", "genre": "人間文化への困惑", "type": "normal", "text": "人間は食べ物の写真を撮ってから食べるらしい。冷めるだろう。あれは記録なのか、それとも儀式なのか？", "recommended_time": "08:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-03-09-4", "date": "2026-03-09", "genre": "魔王城の日常", "type": "normal", "text": "玉座に座り続けると尻が痛い。一万年経っても解決していない。魔王の最大の敵は勇者ではなく、石の椅子かもしれん。", "recommended_time": "12:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-03-09-5", "date": "2026-03-09", "genre": "存在・役割", "type": "normal", "text": "「魔王」と呼ばれ始めたのはいつだったか。最初は別の名があった。だが誰も覚えていない。俺自身ですら、時々忘れる。名前とは、他者が呼ぶことで初めて存在するものらしい。", "recommended_time": "18:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-03-09-6", "date": "2026-03-09", "genre": "善悪への疲れ", "type": "normal", "text": "善と悪を語る者がいると、つい欠伸が出る。あの二つは色のようなもので、見る角度と光の加減でいくらでも変わる。そう言うと大抵怒られるが、怒る者ほど片方しか見ていない。", "recommended_time": "21:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-03-10-1", "date": "2026-03-10", "genre": "所業・伝説（怠惰なる忠誠）", "type": "lore", "text": "ベルフェゴールが一年ぶりに目を覚ました。「閣下、世界はまだありますか」。あると答えたら「ではもう少し」と言って寝直した。あいつの忠誠心は世界の存否確認一回で満たされるらしい。", "recommended_time": "20:00", "used": false, "rejected": false, "tags": [], "edits": [], "lore_no": 23}, {"id": "2026-03-10-2", "date": "2026-03-10", "genre": "所業・伝説（誰も来ない灯台）", "type": "lore", "text": "ノクティアがAzure Islesの灯台を一晩中見ていた。「あの光、誰のためです」と訊く。もう誰も来ぬ港だ。「消し忘れだろう」と言ったら首を振った。「祈りです」と。", "recommended_time": "22:00", "used": false, "rejected": false, "tags": [], "edits": [], "lore_no": 24}, {"id": "2026-03-10-3", "date": "2026-03-10", "genre": "存在・内省", "type": "normal", "text": "千年ぶりに夢を見た。内容は忘れた。忘れたということは、きっといい夢だったのだろう。", "recommended_time": "08:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-03-10-4", "date": "2026-03-10", "genre": "日常・感覚", "type": "normal", "text": "玉座の間に蜘蛛が巣を張った。払おうとしたが、やめた。あの小さな建築を壊すのは、少し惜しい。", "recommended_time": "12:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-03-10-5", "date": "2026-03-10", "genre": "関係・感情", "type": "normal", "text": "料理番が新しい菓子を作った。甘すぎた。だが「不味い」とは言えなかった。あいつが三日かけたのを知っていたからだ。味ではなく、手間に負けた。", "recommended_time": "18:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-03-10-6", "date": "2026-03-10", "genre": "存在・思想", "type": "normal", "text": "眠れぬ夜に星を数える。一万年前と同じ星がまだある。消えた星もある。新しく生まれた星もある。俺はいつも、消えた星ばかり探してしまう。", "recommended_time": "21:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-03-11-1", "date": "2026-03-11", "genre": "所業・伝説（氷原の剣）", "type": "lore", "text": "Vyrnaの氷原で、エリューシオンが不意に笑い出した。理由を訊いたら「この氷の下に、閣下が千年前に投げた剣がまだ刺さっています」と。覚えていなかった。だがあいつは覚えていた。", "recommended_time": "20:00", "used": false, "rejected": false, "tags": [], "edits": [], "lore_no": 25}, {"id": "2026-03-11-2", "date": "2026-03-11", "genre": "所業・伝説（砂漠の城）", "type": "lore", "text": "Kael'sarに城を築いたことがある。砂嵐から街を守るためだ。だが嵐は城を避けて迂回し、別の三つの村を飲んだ。俺が守ろうとすると、別の何かが壊れる。呪いではない。ただの因果だ。", "recommended_time": "22:00", "used": false, "rejected": false, "tags": [], "edits": [], "lore_no": 26}, {"id": "2026-03-11-3", "date": "2026-03-11", "genre": "力の不便", "type": "normal", "text": "握手ができない。どれだけ力を抜いても、相手が顔を歪める。", "recommended_time": "08:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-03-11-4", "date": "2026-03-11", "genre": "時間感覚", "type": "normal", "text": "暇な日の午後は、千年の戦より長い。", "recommended_time": "12:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-03-11-5", "date": "2026-03-11", "genre": "部下との一幕", "type": "normal", "text": "部下に「休暇をください」と言われた。魔王城に休暇制度はない。ないが断る理由もなかった。三日やると言ったら「一週間で」と交渉された。あの度胸、勇者の方に向けてくれ。", "recommended_time": "18:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-03-11-6", "date": "2026-03-11", "genre": "些細な疑問", "type": "normal", "text": "風呂の湯が冷めない。魔力が無意識に温めているのか、それとも俺自身が冷たさを感じなくなったのか。一万年経つと、自分の体のことすら分からなくなるものか？", "recommended_time": "21:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-03-12-1", "date": "2026-03-12", "genre": "所業・伝説（森の白枯れ）", "type": "lore", "text": "Eryndorの森が一夜で白く枯れた年がある。ゼイファーが原因を探りに行き、三日帰らなかった。戻った時、森は緑だった。何をしたか訊いても「散歩です」としか言わない。あの森は未だゼイファーに借りがある。", "recommended_time": "20:00", "used": false, "rejected": false, "tags": [], "edits": [], "lore_no": 27}, {"id": "2026-03-12-2", "date": "2026-03-12", "genre": "所業・伝説（勝者の涙）", "type": "lore", "text": "イリムが初めて俺の前で泣いたのは、敵を倒した夜だった。「勝ったのに、なぜ泣く」と訊いた。「勝ったからです」と返された。あの言葉の意味が分かるまで、俺は二百年かかった。", "recommended_time": "22:00", "used": false, "rejected": false, "tags": [], "edits": [], "lore_no": 28}, {"id": "2026-03-12-3", "date": "2026-03-12", "genre": "日常・感覚", "type": "normal", "text": "雨が好きだ。理由はない。千年考えて、理由がないまま好きだと認めた。", "recommended_time": "08:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-03-12-4", "date": "2026-03-12", "genre": "力の不便", "type": "normal", "text": "俺は火を操るが、焚き火は自分で薪を組んで起こす。魔力で灯した火には、匂いがない。", "recommended_time": "12:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-03-12-5", "date": "2026-03-12", "genre": "存在・思想", "type": "normal", "text": "時々、人間の葬儀を遠くから見る。泣く者、笑う者、黙って立つ者。あの場に流れる空気が何なのか、俺には掴めない。悲しみとは違う。もっと温かい何かだ。俺が絶対に持てない類の温かさだと、それだけは分かる。", "recommended_time": "18:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-03-12-6", "date": "2026-03-12", "genre": "人間への困惑", "type": "normal", "text": "鏡を見ない。顔を忘れたわけではないが、一万年も同じ顔を見続ける趣味はない。人間は毎朝鏡を見るらしいが、あれは確認か？ それとも挨拶か？", "recommended_time": "21:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-03-15-1", "date": "2026-03-15", "genre": "所業・伝説（レヴァナインの毒舌）", "type": "lore", "text": "レヴァナインが「閣下は何を恐れますか」と訊いてきた。「何も」と答えたら笑われた。「それが一番恐ろしいことだと、気づいておられないのですね」。あいつの言葉は、いつも三日後に効く毒だ。", "recommended_time": "20:00", "used": false, "rejected": false, "tags": [], "edits": [], "lore_no": 29}, {"id": "2026-03-15-2", "date": "2026-03-15", "genre": "所業・伝説（バルドゥークの千本目）", "type": "lore", "text": "バルドゥークが鍛えた剣が、千本目で初めて折れた。黙って破片を拾い、翌朝また打ち始めた。「折れた理由が分かりました」と言うまで七日かかった。あいつにとって失敗とは、答えの前置きに過ぎない。", "recommended_time": "22:00", "used": false, "rejected": false, "tags": [], "edits": [], "lore_no": 30}, {"id": "2026-03-15-3", "date": "2026-03-15", "genre": "日常・感覚", "type": "normal", "text": "三つだけ嫌いなものがある。朝と、沈黙を破る義務感と、冷めた茶だ。", "recommended_time": "08:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-03-15-4", "date": "2026-03-15", "genre": "存在・思想", "type": "normal", "text": "不老不死を羨む者がいる。だが不老不死とは、新しい靴が永遠に馴染まないということだ。", "recommended_time": "12:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-03-15-5", "date": "2026-03-15", "genre": "人間の文化への困惑", "type": "normal", "text": "人間は別れ際に「また会おう」と言う。あれは約束か、願いか、それとも嘘か。俺に言ってきた者は、大抵二度と来なかった。", "recommended_time": "18:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-03-15-6", "date": "2026-03-15", "genre": "日常・感覚", "type": "normal", "text": "部下が持ってきた地図に、俺の城が載っていなかった。「省略です」と言い訳されたが、そうではないだろう。誰もこの場所に来たがらないだけだ。地図とは、行きたい場所を描くものらしい。", "recommended_time": "21:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-03-16-1", "date": "2026-03-16", "genre": "所業・伝説（夢の支配者）", "type": "lore", "text": "ノクティアは敵を殺さない。眠らせる。目覚めた者は皆、彼女の味方になっていた。何を見せているのか訊いたら「夢です」とだけ返された。夢に負ける者を、俺は笑えない。", "recommended_time": "20:00", "used": false, "rejected": false, "tags": [], "edits": [], "lore_no": 31}, {"id": "2026-03-16-2", "date": "2026-03-16", "genre": "所業・伝説（壊さぬ者）", "type": "lore", "text": "Azure Islesの灯台が折れた夜、レイヴンが一人で海に立っていた。「直すのか」と訊いたら首を振った。「灯台がなくても帰れる船だけ残せばいい」。あいつは壊れたものを直さない。不要にする。", "recommended_time": "22:00", "used": false, "rejected": false, "tags": [], "edits": [], "lore_no": 32}, {"id": "2026-03-16-3", "date": "2026-03-16", "genre": "人間の文化への困惑", "type": "normal", "text": "人間は花を贈る。なぜ根から引き抜いたものを渡すのか。生きたまま見せればいいだろうに。", "recommended_time": "08:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-03-16-4", "date": "2026-03-16", "genre": "魔王城での些細な出来事", "type": "normal", "text": "城の階段を数えたことが三度ある。毎回数が違う。", "recommended_time": "12:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-03-16-5", "date": "2026-03-16", "genre": "千年単位の内省", "type": "normal", "text": "一万年で学んだことが三つある。怒りは必ず冷める。後悔は冷めない。そしてどちらも、明日の役には立たぬ。", "recommended_time": "18:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-03-16-6", "date": "2026-03-16", "genre": "関係・感情（ベルフェゴール）", "type": "normal", "text": "「閣下、笑ったことはありますか」とベルフェゴールに訊かれた。あると答えたら「では最後に笑ったのはいつですか」と重ねてきた。答えられなかった。その区別がつかないことが、たぶん答えだ。", "recommended_time": "21:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-03-17-1", "date": "2026-03-17", "genre": "所業・伝説（砂嵐の裁定者）", "type": "lore", "text": "Kael'sarの砂嵐が七日止まなかった時、エリューシオンが砂の中へ歩いていった。止めるのかと思った。違った。嵐の中心で座り込み、砂に何かを書いていた。嵐が止んだ後、文字は消えていたが、あの砂漠は二度と荒れなかった。", "recommended_time": "20:00", "used": false, "rejected": false, "tags": [], "edits": [], "lore_no": 33}, {"id": "2026-03-17-2", "date": "2026-03-17", "genre": "所業・伝説（凍らない炎）", "type": "lore", "text": "Vyrnaの氷原を焼こうとしたことがある。氷は溶けたが、翌朝には元に戻っていた。三度焼いて三度戻った。四度目に気づいた。あの氷原は俺を試していたのだと。五度目はなかった。", "recommended_time": "22:00", "used": false, "rejected": false, "tags": [], "edits": [], "lore_no": 34}, {"id": "2026-03-17-3", "date": "2026-03-17", "genre": "存在・思想", "type": "normal", "text": "眠れない夜があるのではない。眠る必要がない夜に、眠りたくなるだけだ。", "recommended_time": "08:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-03-17-4", "date": "2026-03-17", "genre": "日常・感覚", "type": "normal", "text": "玉座に座る時間と、玉座の横の床に座る時間、どちらが長いかと問われたら答えに困る。王座とは、結局誰のためにあるのか。", "recommended_time": "12:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-03-17-5", "date": "2026-03-17", "genre": "関係・感情", "type": "normal", "text": "城に猫が迷い込んだ。ノクティアが飼いたいと言い、ゼイファーが名前を付け、バルドゥークが寝床を作った。俺は何もしていないのに、猫は俺の膝で寝ている。こういうことが一番困る。追い出す理由がない。", "recommended_time": "18:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-03-17-6", "date": "2026-03-17", "genre": "幅の広い一発ネタ", "type": "normal", "text": "人間の将棋を教わった。三手で詰んだ。「まだルールを説明してません」と言われた。つまり俺は、存在しないルールで勝ったのか負けたのか。", "recommended_time": "21:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-03-18-1", "date": "2026-03-18", "genre": "所業・伝説（森の賭け）", "type": "lore", "text": "Eryndorの森が一晩で白く染まった。ゼイファーが精霊と賭けをしたと言う。何を賭けたか訊いたら「閣下の名前です」と笑われた。翌朝、森は元の緑に戻っていた。つまり、あいつは俺の名を張って勝ったのだ。", "recommended_time": "20:00", "used": false, "rejected": false, "tags": [], "edits": [], "lore_no": 35}, {"id": "2026-03-18-2", "date": "2026-03-18", "genre": "所業・伝説（石壁の花）", "type": "lore", "text": "イリムが城の壁に花を植えようとした。魔王城の石壁に花は咲かないと言ったら、「咲かせるのではなく、石に花を思い出させるのです」と返された。一年後、壁に苔が生えた。花ではないが、あいつは満足そうだった。", "recommended_time": "22:00", "used": false, "rejected": false, "tags": [], "edits": [], "lore_no": 36}, {"id": "2026-03-18-3", "date": "2026-03-18", "genre": "存在・倦怠", "type": "normal", "text": "退屈は痛みに似ている。どちらも、生きている証だと言われると俺は腹が立つ。", "recommended_time": "08:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-03-18-4", "date": "2026-03-18", "genre": "力の具体的な不便", "type": "normal", "text": "強すぎると、扉を開けるのが一番難しい。力加減を誤ると蝶番ごと吹き飛ぶ。俺は城の扉を今年だけで四枚替えた。", "recommended_time": "12:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-03-18-5", "date": "2026-03-18", "genre": "記憶の実害", "type": "normal", "text": "千年前の夕焼けの色を覚えている。昨日の夕焼けも覚えている。どちらが美しかったかと問われれば同じだと答える。だが同じだと分かってしまうことが、俺にとっては一番の損失だ。", "recommended_time": "18:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-03-18-6", "date": "2026-03-18", "genre": "幅の広い一発ネタ", "type": "normal", "text": "部下たちが「閣下に似合う色」を議論していたらしい。結論は黒。俺が黒い鎧を着ているからではなく、「何色を着ても結局黒に見える」かららしい。反論の余地がなかった。", "recommended_time": "21:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-03-19-1", "date": "2026-03-19", "genre": "所業・伝説（武器を捨てた将）", "type": "lore", "text": "レヴァナインが剣を折った。敵の剣ではない、自分の剣だ。「もう要らん」と言った翌日、素手で砦を三つ落とした。あいつが武器を捨てる時は、大抵もっと厄介になる。", "recommended_time": "20:00", "used": false, "rejected": false, "tags": [], "edits": [], "lore_no": 37}, {"id": "2026-03-19-2", "date": "2026-03-19", "genre": "所業・伝説（神との百年の沈黙）", "type": "lore", "text": "天の神が「世界の均衡が乱れている」と言ってきた。原因は俺だと。均衡を保ちたいなら最初から俺を作るなと返したら、百年ほど黙られた。あの沈黙が回答だったのだろう。", "recommended_time": "22:00", "used": false, "rejected": false, "tags": [], "edits": [], "lore_no": 38}, {"id": "2026-03-19-3", "date": "2026-03-19", "genre": "存在・思想", "type": "normal", "text": "誰にも頼まれていないのに守っているものがある。それが何かは、まだ言わない。", "recommended_time": "08:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-03-19-4", "date": "2026-03-19", "genre": "日常・感覚", "type": "normal", "text": "朝の光が城に差し込むと、埃が金色に見える。美しいと思ったが、あれは結局、汚れだ。汚れを美しいと感じるなら、清潔とは何だ。", "recommended_time": "12:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-03-19-5", "date": "2026-03-19", "genre": "関係・感情", "type": "normal", "text": "千年分の戦略を知っているのに、部下の誕生日を一つも覚えていない。ゼイファーに「記憶力ではなく関心の問題です」と言われた。否定できなかったのが一番悔しい。", "recommended_time": "18:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-03-19-6", "date": "2026-03-19", "genre": "日常・感覚", "type": "normal", "text": "雨の音を聞いていると、何も壊さなかった日を思い出す。そういう日は数えるほどしかないが、不思議と全部覚えている。", "recommended_time": "21:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-03-20-1", "date": "2026-03-20", "genre": "所業・伝説（星明かりの問い）", "type": "lore", "text": "Azure Islesの星明かりの下でレイヴンに訊いた。「お前は何のために戦う？」あいつは笑って「忘れました」と答えた。嘘だと分かっていた。忘れた者はあんな顔で笑わない。", "recommended_time": "20:00", "used": false, "rejected": false, "tags": [], "edits": [], "lore_no": 39}, {"id": "2026-03-20-2", "date": "2026-03-20", "genre": "所業・伝説（完璧な言語）", "type": "lore", "text": "千年前に完璧な言語を作った。曖昧さがなく、嘘がつけない構造だ。広めたら三日で誰も使わなくなった。人は本音を正確に伝えられることのほうを恐れる。", "recommended_time": "22:00", "used": false, "rejected": false, "tags": [], "edits": [], "lore_no": 40}, {"id": "2026-03-20-3", "date": "2026-03-20", "genre": "日常・感覚", "type": "normal", "text": "塩だけで食う飯が一番うまい。千年経っても、これだけは変わらなかった。", "recommended_time": "08:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-03-20-4", "date": "2026-03-20", "genre": "関係・感情", "type": "normal", "text": "静かにしろと命じれば城中が従う。俺が欲しいのは従順ではなく、俺の前でも黙らずにいられる奴だ。", "recommended_time": "12:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-03-20-5", "date": "2026-03-20", "genre": "人間への反論", "type": "normal", "text": "人間は花が咲くことを生と呼び、散ることを死と呼ぶ。では種に戻る瞬間を、お前たちは何と呼ぶ？", "recommended_time": "18:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-03-20-6", "date": "2026-03-20", "genre": "存在・退屈", "type": "normal", "text": "今日は何も壊さなかった。何も奪わなかった。何も決めなかった。こういう日を人間は平和と呼ぶらしいが、俺にはただ長い。", "recommended_time": "21:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-03-21-1", "date": "2026-03-21", "genre": "所業・伝説（砂嵐の観察者）", "type": "lore", "text": "Kael'sarの砂嵐の中でエリューシオンが笑った。「この風、閣下に似ています。触れたものを全て削る」。褒めているのか訊けば「観察です」と返された。あいつの観察は、いつも少し痛い。", "recommended_time": "20:00", "used": false, "rejected": false, "tags": [], "edits": [], "lore_no": 41}, {"id": "2026-03-21-2", "date": "2026-03-21", "genre": "所業・伝説（怠惰な勝負師）", "type": "lore", "text": "ベルフェゴールが三日寝て起きた理由を訊いた。「夢で閣下に負けたので、起きて勝ちに来ました」。そう言って、また寝た。あいつの勝利条件が未だに分からない。", "recommended_time": "22:00", "used": false, "rejected": false, "tags": [], "edits": [], "lore_no": 42}, {"id": "2026-03-21-3", "date": "2026-03-21", "genre": "日常・ユーモア", "type": "normal", "text": "玉座は硬い。千年座っても慣れん。だが立つと部下が慌てるので、結局座っている。", "recommended_time": "08:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-03-21-4", "date": "2026-03-21", "genre": "関係・逆説", "type": "normal", "text": "最も信頼している部下ほど、俺の命令を聞かない。聞かないから信頼しているのかもしれんが。", "recommended_time": "12:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-03-21-5", "date": "2026-03-21", "genre": "日常・城の情景", "type": "normal", "text": "夜中に城を歩いていたら、見張りの兵が居眠りしていた。起こさず通り過ぎた。魔王が見逃したと知ったら、あいつは明日からもっと真面目に立つだろうか。それとも、安心して眠るだろうか。", "recommended_time": "18:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-03-21-6", "date": "2026-03-21", "genre": "関係・謎", "type": "normal", "text": "部下に禁じていることが三つある。俺の寝顔を見ること。俺より先に死ぬこと。三つ目は——まだ誰にも言っていない。", "recommended_time": "21:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-03-22-1", "date": "2026-03-22", "genre": "所業・伝説（影の記憶）", "type": "lore", "text": "ノクティアに「お前の影には何が映る」と訊いた。あいつは黙って俺の影を指した。俺の影の中に、俺が滅ぼした者たちの輪郭が見えた。それが見えるのは、ノクティアだけだった。", "recommended_time": "20:00", "used": false, "rejected": false, "tags": [], "edits": [], "lore_no": 43}, {"id": "2026-03-22-2", "date": "2026-03-22", "genre": "所業・伝説（休戦の書庫）", "type": "lore", "text": "イリムが魔王城の地下に書庫を作っていた。千年分の戦の記録ではなく、休戦の記録。「こちらの方が短くて楽でした」と笑うので覗いたら——三頁しかなかった。", "recommended_time": "22:00", "used": false, "rejected": false, "tags": [], "edits": [], "lore_no": 44}, {"id": "2026-03-22-3", "date": "2026-03-22", "genre": "存在・思想", "type": "normal", "text": "退屈は、俺にとって最も贅沢な感情かもしれん。", "recommended_time": "08:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-03-22-4", "date": "2026-03-22", "genre": "人間の文化への困惑", "type": "normal", "text": "人間は名前をつけたがる。恐怖にも、希望にも、俺にも。では名前をつけられなかった感情を、お前たちはどう扱う？", "recommended_time": "12:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-03-22-5", "date": "2026-03-22", "genre": "日常・感覚", "type": "normal", "text": "朝の厨房で料理番が包丁を研いでいた。毎日同じ動作、同じ速度、同じ表情。あの男だけは俺が玉座にいようが戦場にいようが何一つ変わらない。それが少しだけ、羨ましい。", "recommended_time": "18:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-03-22-6", "date": "2026-03-22", "genre": "皮肉・ユーモア", "type": "normal", "text": "俺の力を恐れる者は多いが、俺の料理を食った者は三人しかいない。恐怖より、あの味のほうがよほど危険だったらしい。", "recommended_time": "21:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-03-24-1", "date": "2026-03-24", "genre": "所業・伝説（神の遺物）", "type": "lore", "text": "Eryndorの森の奥に神が置いた石がある。触れると森が震える。俺はあれだけは壊さないと決めた。壊せないのではない。壊した後の沈黙が、俺を見るだろうから。", "recommended_time": "20:00", "used": false, "rejected": false, "tags": [], "edits": [], "lore_no": 45}, {"id": "2026-03-24-2", "date": "2026-03-24", "genre": "所業・伝説（泣いた剣）", "type": "lore", "text": "かつて大陸を二つに割る剣を鍛えた。完成した瞬間、剣が泣いた。自分がこれから何をするか知っていたのだ。俺はその剣を海に沈めた。泣く道具で戦うほど落ちぶれてはいない。", "recommended_time": "22:00", "used": false, "rejected": false, "tags": [], "edits": [], "lore_no": 46}, {"id": "2026-03-24-3", "date": "2026-03-24", "genre": "力の不便（ユーモア）", "type": "normal", "text": "握れば山が砕ける手で、毎朝卵を割るのに失敗する。今日で連続四十七日目だ。", "recommended_time": "08:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-03-24-4", "date": "2026-03-24", "genre": "人間文化への困惑", "type": "normal", "text": "人間は別れ際に笑う。あれは何だ。喜びか、諦めか、それとも俺の知らない第三の感情か。", "recommended_time": "12:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-03-24-5", "date": "2026-03-24", "genre": "魔王という役割", "type": "normal", "text": "『魔王』と呼ばれるたびに少しだけ振り向く自分がいる。名に応えているのか、名に縛られているのか。もう区別がつかなくなった。", "recommended_time": "18:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-03-24-6", "date": "2026-03-24", "genre": "城の日常報告", "type": "normal", "text": "今日の城の報告。厨房の猫が魚を盗んだ。見張りが同時にくしゃみをした。中庭に季節外れの花が一輪。どれも取るに足らぬが、俺はこういう日をこそ記録に残したい。", "recommended_time": "21:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-03-25-1", "date": "2026-03-25", "genre": "所業・伝説（剣を置いた日）", "type": "lore", "text": "ゼイファーが剣を置いた日のことを覚えている。「もう斬るものがない」と言った。俺は笑った。斬るものがないのではなく、斬りたくないものが増えたのだと、あいつはまだ気づいていなかった。", "recommended_time": "20:00", "used": false, "rejected": false, "tags": [], "edits": [], "lore_no": 47}, {"id": "2026-03-25-2", "date": "2026-03-25", "genre": "所業・伝説（氷原の街）", "type": "lore", "text": "Vyrnaの氷原で、レヴァナインが足を止めた。氷の下に閉じ込められた古い街が見える。「これも閣下の？」と訊かれ、首を振った。俺が凍らせたのではない。俺が溶かすのを、やめただけだ。", "recommended_time": "22:00", "used": false, "rejected": false, "tags": [], "edits": [], "lore_no": 48}, {"id": "2026-03-25-3", "date": "2026-03-25", "genre": "存在・記憶の重さ", "type": "normal", "text": "千年前の恥を、昨日のことのように思い出す。永遠とは、忘却を許されないということだ。", "recommended_time": "08:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-03-25-4", "date": "2026-03-25", "genre": "善悪への倦怠", "type": "normal", "text": "善も悪も、結局は立つ場所の問題だ。俺はどこにも立っていない。だから、どちらにも疲れる。", "recommended_time": "12:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-03-25-5", "date": "2026-03-25", "genre": "関係・不器用な信頼", "type": "normal", "text": "バルドゥークに酒を注いでくれと頼まれた。魔王に酒を注がせるとは何事かと思ったが、あいつが俺に何かを頼むのは百年に一度だ。注いだ酒を、あいつは無言で飲み干した。それでいい。", "recommended_time": "18:00", "used": false, "rejected": false, "tags": [], "edits": []}, {"id": "2026-03-25-6", "date": "2026-03-25", "genre": "皮肉・自嘲", "type": "normal", "text": "俺が苦手なものは三つある。朝日、謝罪、そして部下の誕生日を覚えること。前者二つは慣れたが、最後だけはどうにもならん。", "recommended_time": "21:00", "used": false, "rejected": false, "tags": [], "edits": []}]/* TWEETS_END */;

function norm() { tw = tw.map(t => ({rejected:false,tags:[],edits:[],...t})); }

// ── IDB ──
function odb() {
  return new Promise((r,j)=>{
    const q=indexedDB.open('arkhe',1);
    q.onupgradeneeded=e=>e.target.result.createObjectStore('h');
    q.onsuccess=e=>r(e.target.result);q.onerror=e=>j(e.target.error);
  });
}
async function sHnd(h){const d=await odb();return new Promise((r,j)=>{const t=d.transaction('h','readwrite');t.objectStore('h').put(h,'tw');t.oncomplete=r;t.onerror=e=>j(e.target.error);})}
async function lHnd(){const d=await odb();return new Promise((r,j)=>{const t=d.transaction('h','readonly');const q=t.objectStore('h').get('tw');q.onsuccess=e=>r(e.target.result);q.onerror=e=>j(e.target.error);})}

// ── INIT ──
async function init() {
  norm(); ren(); stat(); tagbar();
  try {
    const h = await lHnd();
    if (h) {
      const p = await h.queryPermission({mode:'readwrite'});
      if (p==='granted') { fh=h; ss('saved','✓ 自動保存 ON'); await sync(); }
      else {
        ss('connect','🔓 クリックで保存を有効化');
        document.getElementById('ss').onclick = async()=>{
          if((await h.requestPermission({mode:'readwrite'}))==='granted'){fh=h;await sync();ss('saved','✓ 自動保存 ON');document.getElementById('ss').onclick=null;}
        };
      }
    } else { ss('connect','💾 保存先を設定'); document.getElementById('ss').onclick=conn; }
  } catch { ss('connect','💾 保存先を設定'); document.getElementById('ss').onclick=conn; }
}

async function conn() {
  if(!('showOpenFilePicker' in window)){alert('Chrome/Edgeで開いてください');return;}
  try {
    [fh]=await window.showOpenFilePicker({types:[{description:'JSON',accept:{'application/json':['.json']}}]});
    await sHnd(fh); await sync(); ss('saved','✓ 自動保存 ON');
    document.getElementById('ss').onclick=null; toast('ファイルを接続しました',false);
  } catch(e){if(e.name!=='AbortError')ss('error','⚠ 接続失敗');}
}

async function sync() {
  if(!fh) return;
  try {
    const fm = JSON.parse(await(await fh.getFile()).text());
    const mp = {}; fm.forEach(t=>mp[t.id]=t);
    tw.forEach(t=>{if(mp[t.id]){const f=mp[t.id];Object.assign(t,{used:f.used??t.used,rejected:f.rejected??t.rejected,tags:f.tags??t.tags,text:f.text??t.text,edits:f.edits??t.edits});}});
    fm.forEach(t=>{if(!tw.find(x=>x.id===t.id))tw.push({rejected:false,tags:[],edits:[],...t});});
    tw.sort((a,b)=>b.date.localeCompare(a.date)||a.id.localeCompare(b.id));
    ren(); stat(); tagbar();
  } catch(e){console.warn('sync',e);}
}

async function save() {
  if(!fh){ss('connect','💾 保存先を設定（クリック）');document.getElementById('ss').onclick=conn;return;}
  try {
    const w=await fh.createWritable(); await w.write(JSON.stringify(tw,null,2)); await w.close();
    ss('saved','✓ 自動保存 ON');
  } catch{ss('error','⚠ 保存失敗');}
}

// ── MUTATIONS ──
async function togUsed(id) {
  const t=tw.find(x=>x.id===id); if(!t||t.rejected)return;
  t.used=!t.used; ren(); stat();
  toast(t.used?'✓ 使用済みにした':'↩ 未使用に戻した',false); await save();
}
async function togRej(id) {
  const t=tw.find(x=>x.id===id); if(!t)return;
  t.rejected=!t.rejected; if(t.rejected)t.used=false; ren(); stat();
  toast(t.rejected?'🚫 不採用にした':'↩ 不採用を解除した',t.rejected); await save();
}
async function remTag(id,tag) {
  const t=tw.find(x=>x.id===id); if(!t)return;
  t.tags=t.tags.filter(g=>g!==tag); ren(); tagbar(); await save();
}
async function togTag(id,tag) {
  const t=tw.find(x=>x.id===id); if(!t)return;
  const i=t.tags.indexOf(tag); if(i>=0)t.tags.splice(i,1);else t.tags.push(tag);
  popRC(id); ren(); tagbar(); await save();
}

// ── POPOVER ──
function openPop(id,btn) {
  tid=id;
  const p=document.getElementById('pop'),r=btn.getBoundingClientRect();
  p.style.top=(r.bottom+window.scrollY+4)+'px';
  p.style.left=Math.min(r.left,window.innerWidth-300)+'px';
  p.style.display='block'; popRC(id);
  setTimeout(()=>document.getElementById('cti')?.focus(),40);
}
function popRC(id) {
  const t=tw.find(x=>x.id===id); if(!t)return;
  const all=[...new Set([...PRESET,...tw.flatMap(x=>x.tags)])];
  document.getElementById('popcont').innerHTML=all.map(g=>{
    const on=t.tags.includes(g);
    return `<div class="ptag${on?' on':''}" data-pt="${es(g)}">${on?'✓ ':''}${es(g)}</div>`;
  }).join('');
}
document.getElementById('cti').onkeydown=e=>{
  if(e.key==='Enter'){const v=e.target.value.trim();if(v&&tid){togTag(tid,v);e.target.value='';}}
};
document.addEventListener('click',e=>{
  const p=document.getElementById('pop');
  if(p&&!p.contains(e.target)&&p.style.display!=='none'){p.style.display='none';tid=null;}
});

// ── TAG FILTER BAR ──
function tagbar() {
  const bar=document.getElementById('tagbar');
  const all=[...new Set(tw.flatMap(t=>t.tags))].filter(Boolean);
  if(!all.length){bar.style.display='none';return;}
  bar.style.display='flex';
  bar.innerHTML='<span class="tbarlabel">🏷</span>'+
    all.map(g=>`<button class="btn bo${fTags.has(g)?' on':''}" data-tf="${es(g)}">${es(g)}</button>`).join('')+
    (fTags.size?'<button class="btn bo" data-tc style="color:var(--text2)">✕クリア</button>':'');
}
document.getElementById('tagbar').addEventListener('click',e=>{
  const tf=e.target.closest('[data-tf]'),tc=e.target.closest('[data-tc]');
  if(tf){fTags.has(tf.dataset.tf)?fTags.delete(tf.dataset.tf):fTags.add(tf.dataset.tf);tagbar();ren();}
  if(tc){fTags.clear();tagbar();ren();}
});

// ── FILTERS ──
function setF(f){fSt=f;['fa','fun','fs','fr'].forEach((k,i)=>document.getElementById(k).classList.toggle('on',['all','unused','used','rej'][i]===f));ren();}
function setT(t){fTy=t;['ta','tl','tn'].forEach((k,i)=>document.getElementById(k).classList.toggle('on',['all','lore','normal'][i]===t));ren();}

// ── EVENT DELEGATION ──
document.getElementById('list').addEventListener('click',async e=>{
  const pt =e.target.closest('[data-pt]');
  const tx_=e.target.closest('[data-tx]');
  const tp =e.target.closest('[data-tp]');
  const at =e.target.closest('[data-at]');
  const rj =e.target.closest('[data-rj]');
  const cd =e.target.closest('.card');
  if(pt) {await togTag(tid,pt.dataset.pt);return;}
  if(tx_){e.stopPropagation();await remTag(tx_.dataset.id,tx_.dataset.t);return;}
  if(tp) {e.stopPropagation();const g=tp.dataset.tp;fTags.has(g)?fTags.delete(g):fTags.add(g);tagbar();ren();return;}
  if(at) {e.stopPropagation();openPop(at.dataset.at,at);return;}
  if(rj) {e.stopPropagation();await togRej(rj.dataset.rj);return;}
  if(cd) {await togUsed(cd.dataset.id);return;}
});

// ── STATS ──
function stat() {
  const u=tw.filter(t=>t.used).length,r=tw.filter(t=>t.rejected).length;
  document.getElementById('ct').textContent=tw.length;
  document.getElementById('cu').textContent=tw.filter(t=>!t.used&&!t.rejected).length;
  document.getElementById('cs').textContent=u;
  document.getElementById('cr').textContent=r;
}

// ── RENDER ──
function ren() {
  const list=document.getElementById('list');
  const f=tw.filter(t=>{
    if(fSt==='unused'&&(t.used||t.rejected))return false;
    if(fSt==='used'&&!t.used)return false;
    if(fSt==='rej'&&!t.rejected)return false;
    if(fTy==='lore'&&t.type!=='lore')return false;
    if(fTy==='normal'&&t.type!=='normal')return false;
    if(fTags.size&&![...fTags].every(g=>t.tags.includes(g)))return false;
    return true;
  });
  if(!f.length){list.innerHTML='<div class="empty"><div class="ei">🌙</div><p>表示するツイートがない</p></div>';return;}
  const bd={};f.forEach(t=>{(bd[t.date]||(bd[t.date]=[])).push(t);});
  list.innerHTML=Object.keys(bd).sort((a,b)=>b.localeCompare(a)).map(d=>{
    const g=bd[d],u=g.filter(t=>!t.used&&!t.rejected).length;
    return`<div class="dg"><div class="dh"><span class="dl">📅 ${d.replace(/-/g,'/')}</span><span class="dc">未使用 ${u}/全${g.length}</span></div>${g.map(mk).join('')}</div>`;
  }).join('');
}

function mk(t) {
  const sc=t.rejected?'rej':(t.used?'used':'');
  const ci=t.rejected?'✕':(t.used?'✓':'');
  const bl=t.type==='lore'?'tbl':'tbn';
  const tl=t.type==='lore'?'🔴 所業・伝説':'🔵 通常';
  const eb=t.edits?.length?`<span class="eb" title="${t.edits.length}回修正済み">✏ ×${t.edits.length}</span>`:'';
  const lno=t.lore_no?`<span class="lno" title="魔王年代記 第${t.lore_no}話">伝説 #${String(t.lore_no).padStart(3,'0')}</span>`:'';
  const tags=(t.tags||[]).map(g=>`<span class="tp${fTags.has(g)?' fa':''}" data-tp="${es(g)}">${es(g)}<span class="tx" data-tx data-id="${t.id}" data-t="${es(g)}">×</span></span>`).join('');
  return`<div class="card ${t.type} ${sc}" data-id="${t.id}">
    <div class="chk">${ci}</div>
    <div class="cb">
      <div class="cm">
        <span class="tb ${bl}">${tl}</span>
        <span class="ge">${es(t.genre)}</span>
        ${lno}
        ${eb}
        <span class="ti">⏰ ${t.recommended_time}</span>
        <button class="rjbtn${t.rejected?' on':''}" data-rj="${t.id}" title="${t.rejected?'不採用を解除':'不採用にする'}">🚫</button>
      </div>
      <div class="tt">${es(t.text)}</div>
      <div class="ta">${tags}<button class="atb" data-at="${t.id}">＋タグ</button></div>
      <div class="cid">ID: ${t.id}</div>
    </div>
  </div>`;
}

function es(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function ss(c,m){const e=document.getElementById('ss');e.className=c;e.textContent=m;}
function toast(m,red){const e=document.getElementById('toast');e.textContent=m;e.className=red?'show red':'show';clearTimeout(tt);tt=setTimeout(()=>e.classList.remove('show'),2300);}

init();
</script>
</body>
</html>
